name: SEO Query Clustering

on:
  workflow_dispatch:
    inputs:
      input_file:
        description: 'Input file'
        required: false
        default: 'queries.txt'
      threshold:
        description: 'Similarity threshold (0.6-0.9)'
        required: false
        default: '0.75'

jobs:
  cluster:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Load and cluster
        run: |
          python clusterer.py load --input "${{ github.event.inputs.input_file || 'queries.txt' }}"
          python clusterer.py cluster --threshold "${{ github.event.inputs.threshold || '0.75' }}"
      
      - name: Export results
        run: |
          python clusterer.py export --output clustering_results.json
          python clusterer.py export --output clustered_queries.csv
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: seo-clustering-results
          path: |
            clustering_results.json
            clustered_queries.csv
          retention-days: 30
